# Main Hyprland entrypoint
# Split into focused sections under ~/.config/hypr/conf.d/

# Matugen-generated palette
source = ~/.cache/matugen/hypr.conf

source = ~/.config/hypr/conf.d/10-monitors.conf
source = ~/.config/hypr/conf.d/20-programs.conf
source = ~/.config/hypr/conf.d/30-autostart.conf
source = ~/.config/hypr/conf.d/40-environment.conf
source = ~/.config/hypr/conf.d/50-permissions.conf
source = ~/.config/hypr/conf.d/60-look-and-feel.conf
source = ~/.config/hypr/conf.d/70-animations.conf
source = ~/.config/hypr/conf.d/80-inputs.conf
source = ~/.config/hypr/conf.d/90-keybindings.conf
source = ~/.config/hypr/conf.d/95-rules.conf

# Theme overrides managed by the theme switcher
source = ~/.config/hypr/theme.conf

# HyprMod managed settings
source = ~/.config/hypr/hyprland-gui.conf
