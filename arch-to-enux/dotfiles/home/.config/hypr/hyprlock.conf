# Hyprlock config - modern, clean, fingerprint-ready

$font = Cantarell
$accent = rgba(94, 234, 212, 1.0)
$fg = rgba(230, 237, 243, 1.0)
$muted = rgba(148, 163, 184, 1.0)
$bg = rgba(11, 15, 20, 0.65)

general {
    hide_cursor = true
}

# Fingerprint UI prompts (auth is still handled by PAM)
auth {
    fingerprint {
        enabled = true
        ready_message = Scan fingerprint to unlock
        present_message = Scanning...
        retry_delay = 250
    }
}

animations {
    enabled = true
    bezier = smooth, 0.2, 0.8, 0.2, 1.0
    animation = fadeIn, 1, 5, smooth
    animation = fadeOut, 1, 5, smooth
    animation = inputFieldDots, 1, 2, smooth
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
}

image {
    monitor =
    path = ~/.cache/hyprlock-wallpaper
    reload_time = 1
    reload_cmd = cat ~/.cache/current_wallpaper

    size = 180
    rounding = -1
    border_size = 3
    border_color = $accent

    position = 0, 210
    halign = center
    valign = top
}

input-field {
    monitor =
    size = 26%, 5%
    outline_thickness = 2
    inner_color = $bg
    outer_color = rgba(36, 48, 65, 0.9)
    check_color = $accent
    fail_color = rgba(248, 113, 113, 1.0)

    font_color = $fg
    fade_on_empty = false
    rounding = 14

    font_family = $font
    font_size = 20
    placeholder_text = Touch sensor or type password
    fail_text = $PAMFAIL

    dots_spacing = 0.25
    position = 0, -115
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME
    font_size = 72
    font_family = $font
    color = $fg

    position = 0, 70
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_size = 22
    font_family = $font
    color = $muted

    position = 0, 5
    halign = center
    valign = center
}

# HINT
label {
    monitor =
    text = Waiting for your finger
    font_size = 16
    font_family = $font
    color = $muted

    position = 0, -175
    halign = center
    valign = center
}
