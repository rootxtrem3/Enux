# Cyberpunk / cyberdeck theme overrides
# Sharp 45deg-like corners are approximated by disabling rounding.

general {
    gaps_in = 4
    gaps_out = 12

    border_size = 3

    # Neon gradient border at 45deg
    col.active_border = rgba(00f5ffcc) rgba(ff2bd6cc) 45deg
    col.inactive_border = rgba(1a1a1acc)
}

decoration {
    rounding = 0
    rounding_power = 1

    active_opacity = 0.96
    inactive_opacity = 0.82

    shadow {
        enabled = true
        range = 24
        render_power = 4
        color = rgba(00f5ff55)
    }

    blur {
        enabled = true
        size = 6
        passes = 2
        vibrancy = 0.30
        noise = 0.04
        contrast = 1.08
        brightness = 0.98
    }
}

animations {
    enabled = true

    # Tighter, more mechanical motion (less "candy")
    bezier = cyberSnap, 0.18, 0.9, 0.1, 1.0
    bezier = cyberLinear, 0, 0, 1, 1

    animation = global,        1,  6,  cyberLinear
    animation = windows,       1,  4,  cyberSnap
    # Pop from center on open, shrink to center on close
    animation = windowsIn,     1,  4,  cyberSnap, popin 20%
    animation = windowsOut,    1,  3,  cyberLinear, popin 20%
    animation = border,        1,  6,  cyberLinear
    animation = borderangle,   1,  6,  cyberLinear
    animation = fade,          1,  2,  cyberLinear
    animation = layers,        1,  4,  cyberSnap
    animation = workspaces,    1,  5,  cyberSnap, slide
    animation = workspacesIn,  1,  4,  cyberSnap, slide
    animation = workspacesOut, 1,  4,  cyberLinear, slide
}
